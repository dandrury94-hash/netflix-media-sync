<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title or 'Streamarr' }}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icon.svg') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=070" />
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="brand">
                <div class="brand-icon">
                    <img src="{{ url_for('static', filename='icon.svg') }}" alt="NMS" />
                </div>
                <div>
                    <strong>Streamarr</strong>
                    <p>Radarr / Sonarr / Tautulli configuration portal</p>
                </div>
            </div>
            <nav class="topnav">
                <a href="{{ url_for('index') }}" data-tab-target="dashboard">Dashboard</a>
                <a href="{{ url_for('index') }}" data-tab-target="logs">Logs</a>
                <a href="{{ url_for('index') }}" data-tab-target="history">History</a>
                <a href="{{ url_for('index') }}" data-tab-target="protection">Protection</a>
                <a href="{{ url_for('settings_page') }}" class="{% if request.path == url_for('settings_page') %}active{% endif %}">Settings</a>
            </nav>
        </header>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        <footer class="footer">
            <span>Running on Docker · changes saved in settings file</span>
        </footer>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}?v=070"></script>
</body>
</html>
